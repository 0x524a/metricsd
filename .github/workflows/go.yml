name: Go

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'

    - name: Go vet
      run: go vet ./...

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'

    - name: Build
      run: go build -v ./...

    - name: Test with race detector and coverage
      run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: coverage.out

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'

    - name: Set version
      id: version
      run: echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo '0.1.0')" >> "$GITHUB_OUTPUT"

    - name: Build binary
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        mkdir -p bin
        go build -ldflags "-w -s -X main.Version=${{ steps.version.outputs.version }}" \
          -o bin/metricsd-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/metricsd

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: metricsd-${{ matrix.goos }}-${{ matrix.goarch }}
        path: bin/metricsd-${{ matrix.goos }}-${{ matrix.goarch }}

  package-deb:
    name: Package DEB (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'

    - name: Install jq
      run: sudo apt-get install -y jq

    - name: Build DEB package
      run: ARCHS=${{ matrix.arch }} bash packaging/scripts/build-deb.sh

    - name: Upload DEB
      uses: actions/upload-artifact@v4
      with:
        name: metricsd-deb-${{ matrix.arch }}
        path: dist/*.deb

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [package-deb]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v6

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          artifacts/metricsd-linux-amd64/metricsd-linux-amd64
          artifacts/metricsd-linux-arm64/metricsd-linux-arm64
          artifacts/metricsd-deb-amd64/*.deb
          artifacts/metricsd-deb-arm64/*.deb
